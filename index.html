<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>最適授業サーチ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:#f4f7fb;
  color:#111827;
}

header{
  background:linear-gradient(90deg,#003b8f,#0057d9);
  color:white;
  padding:28px 36px;
  text-align:center;
}

header h1{
  margin:0;
  font-size:34px;
}

header p{
  margin:8px 0 0;
  font-size:15px;
}

.container{
  max-width:760px;
  margin:32px auto;
  padding:0 20px;
}

.search-card{
  background:white;
  border-radius:18px;
  padding:28px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
}

.section-title{
  font-size:22px;
  font-weight:900;
  margin:0 0 8px;
}

.section-sub{
  color:#64748b;
  font-size:14px;
  line-height:1.7;
  margin:0 0 18px;
}

label{
  display:block;
  font-weight:800;
  margin-top:22px;
  margin-bottom:8px;
}

input,select,textarea{
  width:100%;
  padding:13px;
  border:1px solid #d6dce5;
  border-radius:10px;
  font-size:15px;
  font-family:inherit;
}

textarea{
  min-height:120px;
  resize:vertical;
}

.range-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.range-value{
  font-weight:800;
  color:#0057d9;
}

.slider{
  margin:20px 8px 12px;
}

.noUi-connect{
  background:#0057d9;
}

.noUi-handle{
  border-radius:50%;
  width:22px!important;
  height:22px!important;
  right:-11px!important;
  top:-3px!important;
  border:3px solid white;
  background:#0057d9;
  box-shadow:0 0 0 2px #0057d9;
}

.noUi-handle:before,
.noUi-handle:after{
  display:none;
}

button{
  width:100%;
  margin-top:28px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#0057d9;
  color:white;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
}

button:hover{
  background:#0046b5;
}

.reset{
  margin-top:10px;
  background:white;
  color:#334155;
  border:1px solid #cbd5e1;
}

.reset:hover{
  background:#f8fafc;
}

.note{
  margin-top:18px;
  background:#eef6ff;
  color:#004299;
  border:1px solid #93c5fd;
  padding:14px;
  border-radius:10px;
  font-size:14px;
  line-height:1.7;
}

.divider{
  margin:34px 0;
  border:none;
  border-top:1px solid #e5e7eb;
}

.ai-box{
  background:#f8fbff;
  border:1px solid #bfdbfe;
  border-radius:16px;
  padding:22px;
}

.ai-label{
  display:inline-block;
  background:#e0ecff;
  color:#1d4ed8;
  font-weight:900;
  padding:5px 10px;
  border-radius:999px;
  font-size:13px;
  margin-bottom:10px;
}

.example{
  font-size:13px;
  color:#64748b;
  line-height:1.7;
  margin-top:8px;
}
</style>
</head>

<body>

<header>
  <h1>最適授業サーチ</h1>
  <p>希望条件や相談文から、自分に合った授業を探せます</p>
</header>

<div class="container">
  <div class="search-card">

    <h2 class="section-title">条件から探す</h2>
    <p class="section-sub">
      授業名・先生名・評価割合などを指定して、条件に合う授業を検索できます。
    </p>

    <label>キーワード</label>
    <input id="keyword" placeholder="例：Python、数学、レポート、吉田">

    <label>出席の厳しさ</label>
    <select id="attendance" name="attendance">
      <option value="">指定なし</option>
      <option value="厳しい">厳しい</option>
      <option value="普通">普通</option>
      <option value="厳しくない">厳しくない</option>
    </select>

    <label class="range-title">
      <span>試験割合</span>
      <span class="range-value" id="testText">0%〜100%</span>
    </label>
    <div id="testSlider" class="slider"></div>

    <label class="range-title">
      <span>レポート割合</span>
      <span class="range-value" id="reportText">0%〜100%</span>
    </label>
    <div id="reportSlider" class="slider"></div>

    <button onclick="goResults()">検索する</button>
    <button class="reset" onclick="resetForm()">条件をリセット</button>

    <div class="note">
      例：試験なしがいい場合は「試験割合 0%〜0%」で検索できます。
    </div>

    <hr class="divider">

    <div class="ai-box">
      <div class="ai-label">AI授業相談</div>

      <h2 class="section-title">文章で相談して探す</h2>
      <p class="section-sub">
        まだ条件がはっきり決まっていない場合は、希望を文章で入力するとおすすめ授業を提案します。
      </p>

      <label>相談内容</label>
      <textarea id="aiText" placeholder="例：Pythonを使って学びたい。テストは苦手で、レポート中心がいい。将来IT系に進みたい。"></textarea>

      <div class="example">
        入力例：<br>
        ・数学は好きだけど、テストが重い授業は避けたい<br>
        ・Pythonやデータ分析を学びたい<br>
        ・レポート中心で取りやすい授業を知りたい
      </div>

      <button onclick="goAI()">AIにおすすめしてもらう</button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>

<script>
const testSlider = document.getElementById("testSlider");
const reportSlider = document.getElementById("reportSlider");

noUiSlider.create(testSlider,{
  start:[0,100],
  connect:true,
  step:10,
  range:{min:0,max:100}
});

noUiSlider.create(reportSlider,{
  start:[0,100],
  connect:true,
  step:10,
  range:{min:0,max:100}
});

testSlider.noUiSlider.on("update", values=>{
  document.getElementById("testText").textContent =
    Math.round(values[0]) + "%〜" + Math.round(values[1]) + "%";
});

reportSlider.noUiSlider.on("update", values=>{
  document.getElementById("reportText").textContent =
    Math.round(values[0]) + "%〜" + Math.round(values[1]) + "%";
});

function goResults(){
  const keyword = encodeURIComponent(document.getElementById("keyword").value.trim());
  const attendance = encodeURIComponent(document.getElementById("attendance").value);

  const testValues = testSlider.noUiSlider.get();
  const reportValues = reportSlider.noUiSlider.get();

  const minTest = Math.round(testValues[0]);
  const maxTest = Math.round(testValues[1]);
  const minReport = Math.round(reportValues[0]);
  const maxReport = Math.round(reportValues[1]);

  location.href =
    `results.html?keyword=${keyword}&attendance=${attendance}&minTest=${minTest}&maxTest=${maxTest}&minReport=${minReport}&maxReport=${maxReport}`;
}

function goAI(){
  const text = document.getElementById("aiText").value.trim();

  if(text === ""){
    alert("相談内容を入力してください。");
    return;
  }

  location.href = `ai.html?text=${encodeURIComponent(text)}`;
}

function resetForm(){
  document.getElementById("keyword").value = "";
  document.getElementById("attendance").value = "";
  document.getElementById("aiText").value = "";
  testSlider.noUiSlider.set([0,100]);
  reportSlider.noUiSlider.set([0,100]);
}
</script>

</body>
</html>
