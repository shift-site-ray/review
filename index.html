<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>楽単Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:#f4f7fb;
  color:#111827;
}

header{
  background:linear-gradient(90deg,#003b8f,#0057d9);
  color:white;
  padding:28px 36px;
  text-align:center;
}

header h1{
  margin:0;
  font-size:34px;
}

header p{
  margin:8px 0 0;
  font-size:15px;
}

.container{
  max-width:760px;
  margin:32px auto;
  padding:0 20px;
}

.search-card{
  background:white;
  border-radius:18px;
  padding:28px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
}

label{
  display:block;
  font-weight:800;
  margin-top:22px;
  margin-bottom:8px;
}

input,select{
  width:100%;
  padding:13px;
  border:1px solid #d6dce5;
  border-radius:10px;
  font-size:15px;
}

.range-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.range-value{
  font-weight:800;
  color:#0057d9;
}

.range-wrap{
  position:relative;
  height:42px;
  margin-top:8px;
}

.range-wrap input[type=range]{
  position:absolute;
  left:0;
  top:8px;
  width:100%;
  pointer-events:none;
  appearance:none;
  background:none;
  padding:0;
}

.range-wrap input[type=range]::-webkit-slider-thumb{
  pointer-events:auto;
  appearance:none;
  width:20px;
  height:20px;
  border-radius:50%;
  background:#0057d9;
  border:3px solid white;
  box-shadow:0 0 0 2px #0057d9;
  cursor:pointer;
}

.range-wrap input[type=range]::-webkit-slider-runnable-track{
  height:8px;
  background:#dbeafe;
  border-radius:999px;
}

button{
  width:100%;
  margin-top:28px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#0057d9;
  color:white;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
}

button:hover{
  background:#0046b5;
}

.reset{
  margin-top:10px;
  background:white;
  color:#334155;
  border:1px solid #cbd5e1;
}

.reset:hover{
  background:#f8fafc;
}

.note{
  margin-top:18px;
  background:#eef6ff;
  color:#004299;
  border:1px solid #93c5fd;
  padding:14px;
  border-radius:10px;
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <h1>楽単Search</h1>
  <p>希望条件から、先輩レビュー付きの授業を検索</p>
</header>

<div class="container">

  <div class="search-card">

    <label>キーワード</label>
    <input id="keyword" placeholder="例：Python、数学、レポート、吉田">

    <label>出席の厳しさ</label>
    <select id="attendance">
      <option value="">指定なし</option>
      <option value="ゆるめ">ゆるめ</option>
      <option value="普通">普通</option>
      <option value="厳しい">厳しい</option>
    </select>

    <label class="range-title">
      <span>試験割合</span>
      <span class="range-value" id="testText">0%〜100%</span>
    </label>
    <div class="range-wrap">
      <input type="range" id="minTest" min="0" max="100" step="10" value="0" oninput="syncRanges('test')">
      <input type="range" id="maxTest" min="0" max="100" step="10" value="100" oninput="syncRanges('test')">
    </div>

    <label class="range-title">
      <span>レポート割合</span>
      <span class="range-value" id="reportText">0%〜100%</span>
    </label>
    <div class="range-wrap">
      <input type="range" id="minReport" min="0" max="100" step="10" value="0" oninput="syncRanges('report')">
      <input type="range" id="maxReport" min="0" max="100" step="10" value="100" oninput="syncRanges('report')">
    </div>

    <button onclick="goResults()">検索する</button>
    <button class="reset" onclick="resetForm()">条件をリセット</button>

    <div class="note">
      例：試験なしがいい場合は「試験割合 0%〜0%」にすると検索できます。
    </div>

  </div>

</div>

<script>
function syncRanges(type){
  const min = document.getElementById("min" + capitalize(type));
  const max = document.getElementById("max" + capitalize(type));

  let minVal = Number(min.value);
  let maxVal = Number(max.value);

  if(minVal > maxVal){
    if(event.target.id.startsWith("min")){
      max.value = minVal;
      maxVal = minVal;
    }else{
      min.value = maxVal;
      minVal = maxVal;
    }
  }

  document.getElementById(type + "Text").textContent =
    minVal + "%〜" + maxVal + "%";
}

function capitalize(str){
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function goResults(){
  const keyword = encodeURIComponent(document.getElementById("keyword").value.trim());
  const attendance = encodeURIComponent(document.getElementById("attendance").value);

  const minTest = document.getElementById("minTest").value;
  const maxTest = document.getElementById("maxTest").value;
  const minReport = document.getElementById("minReport").value;
  const maxReport = document.getElementById("maxReport").value;

  location.href =
    `results.html?keyword=${keyword}&attendance=${attendance}&minTest=${minTest}&maxTest=${maxTest}&minReport=${minReport}&maxReport=${maxReport}`;
}

function resetForm(){
  document.getElementById("keyword").value = "";
  document.getElementById("attendance").value = "";

  document.getElementById("minTest").value = 0;
  document.getElementById("maxTest").value = 100;
  document.getElementById("minReport").value = 0;
  document.getElementById("maxReport").value = 100;

  syncRanges("test");
  syncRanges("report");
}

syncRanges("test");
syncRanges("report");
</script>

</body>
</html>
