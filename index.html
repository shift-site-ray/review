<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>楽単Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
}
.container{
  max-width:800px;
  margin:auto;
}
.box{
  background:white;
  padding:24px;
  border-radius:14px;
  box-shadow:0 2px 8px #ddd;
}
h1{
  text-align:center;
}
label{
  font-weight:bold;
  display:block;
  margin-top:16px;
}
input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  box-sizing:border-box;
}
.range-row{
  display:flex;
  align-items:center;
  gap:10px;
}
.range-row input{
  flex:1;
}
.value{
  width:60px;
  text-align:right;
  font-weight:bold;
}
button{
  width:100%;
  padding:12px;
  margin-top:20px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-size:16px;
}
</style>
</head>

<body>
<div class="container">

<h1>楽単Search</h1>

<div class="box">

<label>キーワード</label>
<input id="keyword" placeholder="例：Python、レポート、数学">

<label>出席の厳しさ</label>
<select id="attendance">
  <option value="">指定なし</option>
  <option value="ゆるめ">ゆるめ</option>
  <option value="普通">普通</option>
  <option value="厳しい">厳しい</option>
</select>

<label>テスト割合は何％以下？</label>
<div class="range-row">
  <input type="range" id="maxTest" min="0" max="100" step="10" value="100" oninput="updateValues()">
  <span class="value" id="testValue">100%</span>
</div>

<label>レポート割合は何％以上？</label>
<div class="range-row">
  <input type="range" id="minReport" min="0" max="100" step="10" value="0" oninput="updateValues()">
  <span class="value" id="reportValue">0%</span>
</div>

<button onclick="goSearch()">検索する</button>

</div>
</div>

<script>
function updateValues(){
  document.getElementById("testValue").textContent =
    document.getElementById("maxTest").value + "%";

  document.getElementById("reportValue").textContent =
    document.getElementById("minReport").value + "%";
}

function goSearch(){

  const keyword =
    encodeURIComponent(document.getElementById("keyword").value);

  const attendance =
    encodeURIComponent(document.getElementById("attendance").value);

  const maxTest =
    document.getElementById("maxTest").value;

  const minReport =
    document.getElementById("minReport").value;

  location.href =
    `results.html?keyword=${keyword}&attendance=${attendance}&maxTest=${maxTest}&minReport=${minReport}`;
}

updateValues();
</script>

</body>
</html>
