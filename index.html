<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>授業レビューサイト</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .form-box, .review-card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      box-sizing: border-box;
    }

    textarea {
      height: 90px;
    }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 16px;
      border-radius: 8px;
    }

    .review-card h2 {
      margin-top: 0;
    }

    .tag {
      display: inline-block;
      background: #e0ecff;
      padding: 4px 8px;
      border-radius: 6px;
      margin: 3px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>授業レビューサイト</h1>

    <div class="form-box">
      <h2>授業レビューを入力</h2>

      <label>授業名</label>
      <input type="text" id="className" placeholder="例：アルゴリズム">

      <label>先生名</label>
      <input type="text" id="teacherName" placeholder="例：森本 裕介">

      <label>テスト割合（%）</label>
      <input type="number" id="testRate" min="0" max="100" placeholder="例：60">

      <label>レポート割合（%）</label>
      <input type="number" id="reportRate" min="0" max="100" placeholder="例：30">

      <label>小テスト・出席・その他（%）</label>
      <input type="number" id="otherRate" min="0" max="100" placeholder="例：10">

      <label>楽さ</label>
      <select id="easyLevel">
        <option value="★">★ きつめ</option>
        <option value="★★">★★ 普通</option>
        <option value="★★★">★★★ 楽め</option>
      </select>

      <label>感想</label>
      <textarea id="comment" placeholder="例：毎週課題はあるが、試験がないので取りやすい。"></textarea>

      <button onclick="addReview()">追加する</button>
    </div>

    <div id="reviewList"></div>
  </div>

  <script>
    let reviews = JSON.parse(localStorage.getItem("reviews")) || [];

    function addReview() {
      const className = document.getElementById("className").value;
      const teacherName = document.getElementById("teacherName").value;
      const testRate = document.getElementById("testRate").value;
      const reportRate = document.getElementById("reportRate").value;
      const otherRate = document.getElementById("otherRate").value;
      const easyLevel = document.getElementById("easyLevel").value;
      const comment = document.getElementById("comment").value;

      if (!className || !teacherName) {
        alert("授業名と先生名は入力してください");
        return;
      }

      const review = {
        className,
        teacherName,
        testRate,
        reportRate,
        otherRate,
        easyLevel,
        comment
      };

      reviews.push(review);
      localStorage.setItem("reviews", JSON.stringify(reviews));

      clearForm();
      displayReviews();
    }

    function displayReviews() {
      const reviewList = document.getElementById("reviewList");
      reviewList.innerHTML = "";

      reviews.forEach((review, index) => {
        reviewList.innerHTML += `
          <div class="review-card">
            <h2>${review.className}</h2>
            <p><strong>先生：</strong>${review.teacherName}</p>
            <span class="tag">テスト ${review.testRate || 0}%</span>
            <span class="tag">レポート ${review.reportRate || 0}%</span>
            <span class="tag">その他 ${review.otherRate || 0}%</span>
            <span class="tag">楽さ ${review.easyLevel}</span>
            <p>${review.comment}</p>
            <button onclick="deleteReview(${index})">削除</button>
          </div>
        `;
      });
    }

    function deleteReview(index) {
      reviews.splice(index, 1);
      localStorage.setItem("reviews", JSON.stringify(reviews));
      displayReviews();
    }

    function clearForm() {
      document.getElementById("className").value = "";
      document.getElementById("teacherName").value = "";
      document.getElementById("testRate").value = "";
      document.getElementById("reportRate").value = "";
      document.getElementById("otherRate").value = "";
      document.getElementById("comment").value = "";
    }

    displayReviews();
  </script>
</body>
</html>
