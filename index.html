<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>授業おすすめ検索</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0;padding:20px;}
.container{max-width:900px;margin:auto;}
.box,.card{background:white;padding:20px;border-radius:14px;margin-bottom:18px;box-shadow:0 2px 8px #ddd;}
label{font-weight:bold;display:block;margin-top:14px;}
input,select{width:100%;padding:10px;margin-top:6px;box-sizing:border-box;}
.range-row{display:flex;gap:10px;align-items:center;}
.range-row input{flex:1;}
.value{width:60px;text-align:right;font-weight:bold;}
button{width:100%;padding:12px;margin-top:18px;border:none;border-radius:8px;background:#2563eb;color:white;font-size:16px;}
.tag{display:inline-block;background:#e8f0ff;padding:5px 8px;border-radius:6px;margin:4px;font-size:14px;}
.small{color:#666;font-size:14px;}
</style>
</head>

<body>
<div class="container">
<h1>授業おすすめ検索</h1>

<div class="box">
  <h2>希望条件を入力</h2>

  <label>キーワード</label>
  <input id="keyword" placeholder="例：レポート、Python、数学、実験">

  <label>楽さ</label>
  <select id="easy">
    <option value="0">指定なし</option>
    <option value="1">★以上</option>
    <option value="2">★★以上</option>
    <option value="3">★★★以上</option>
    <option value="4">★★★★以上</option>
    <option value="5">★★★★★のみ</option>
  </select>

  <label>テスト割合は何％以下がいい？</label>
  <div class="range-row">
    <input type="range" id="maxTest" min="0" max="100" step="10" value="100" oninput="updateValues()">
    <span class="value" id="testValue">100%</span>
  </div>

  <label>レポート割合は何％以上がいい？</label>
  <div class="range-row">
    <input type="range" id="minReport" min="0" max="100" step="10" value="0" oninput="updateValues()">
    <span class="value" id="reportValue">0%</span>
  </div>

  <label>課題・演習割合は何％以下がいい？</label>
  <div class="range-row">
    <input type="range" id="maxTask" min="0" max="100" step="10" value="100" oninput="updateValues()">
    <span class="value" id="taskValue">100%</span>
  </div>

  <button onclick="searchClasses()">検索する</button>
</div>

<div id="resultList">読み込み中...</div>
</div>

<script>
let classes = [];

async function loadClasses(){
  try{
    const response = await fetch("classes.json");
    classes = await response.json();
    displayResults(classes);
  }catch(error){
    document.getElementById("resultList").innerHTML =
      `<div class="card">classes.json の読み込みに失敗しました。</div>`;
  }
}

function updateValues(){
  document.getElementById("testValue").textContent = document.getElementById("maxTest").value + "%";
  document.getElementById("reportValue").textContent = document.getElementById("minReport").value + "%";
  document.getElementById("taskValue").textContent = document.getElementById("maxTask").value + "%";
}

function stars(n){
  return "★".repeat(n) + "☆".repeat(5-n);
}

function searchClasses(){
  const keyword = document.getElementById("keyword").value.trim();
  const easy = Number(document.getElementById("easy").value);
  const maxTest = Number(document.getElementById("maxTest").value);
  const minReport = Number(document.getElementById("minReport").value);
  const maxTask = Number(document.getElementById("maxTask").value);

  const results = classes.filter(c => {
    const text = c.name + c.teacher + c.memo + c.tags.join("");
    return (
      c.easy >= easy &&
      c.test <= maxTest &&
      c.report >= minReport &&
      c.task <= maxTask &&
      (keyword === "" || text.includes(keyword))
    );
  });

  displayResults(results);
}

function displayResults(results){
  const list = document.getElementById("resultList");
  list.innerHTML = "";

  if(results.length === 0){
    list.innerHTML = `<div class="card">条件に合う授業が見つかりませんでした。</div>`;
    return;
  }

  results.forEach(c => {
    list.innerHTML += `
      <div class="card">
        <h2>${c.name}</h2>
        <p><strong>先生：</strong>${c.teacher}</p>
        <p><strong>楽さ：</strong>${stars(c.easy)}</p>
        <span class="tag">テスト ${c.test}%</span>
        <span class="tag">レポート ${c.report}%</span>
        <span class="tag">課題・演習 ${c.task}%</span>
        <span class="tag">その他 ${c.other}%</span>
        <p>${c.memo}</p>
        <p class="small">${c.tags.map(t => "#" + t).join(" ")}</p>
      </div>
    `;
  });
}

updateValues();
loadClasses();
</script>
</body>
</html>
