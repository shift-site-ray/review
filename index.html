<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>最適授業サーチ</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --main-blue: #2563eb;
      --dark-blue: #1d4ed8;
      --light-blue: #eff6ff;
      --border-color: #cbd5e1;
      --text-color: #111827;
      --sub-text: #475569;
    }

    body {
      margin: 0;
      font-family:
        "Segoe UI",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      color: var(--text-color);
      background: #f4f7fb;
    }

    /* ヘッダー */
    header {
      padding: 17px 30px;
      color: white;
      background:
        linear-gradient(
          90deg,
          #003b8f,
          #0057d9
        );
    }

    header h1 {
      margin: 0;
      font-size: 25px;
    }

    header p {
      margin: 4px 0 0;
      font-size: 13px;
      opacity: 0.95;
    }

    /* ページ全体 */
    .container {
      width: min(800px, calc(100% - 28px));
      margin: 16px auto;
    }

    .main-card {
      padding: 21px;
      background: white;
      border-radius: 15px;
      box-shadow:
        0 5px 18px rgba(15, 23, 42, 0.08);
    }

    h2 {
      margin: 0 0 14px;
      font-size: 21px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 14px;
      font-weight: 700;
    }

    /* キーワード検索欄 */
    .keyword-search {
      display: flex;
      align-items: center;
      width: 100%;
      height: 45px;
      overflow: hidden;
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 11px;
      transition:
        border-color 0.2s,
        box-shadow 0.2s;
    }

    .keyword-search:focus-within {
      border-color: var(--main-blue);
      box-shadow:
        0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .keyword-search input {
      flex: 1;
      min-width: 0;
      height: 100%;
      padding: 0 13px;
      font-size: 15px;
      background: transparent;
      border: none;
      outline: none;
    }

    /* 共通虫眼鏡ボタン */
    .search-icon-button {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 48px;
      height: 100%;
      padding: 0;
      color: var(--main-blue);
      background: transparent;
      border: none;
      cursor: pointer;
      transition:
        color 0.2s,
        background 0.2s,
        transform 0.2s;
    }

    .search-icon-button:hover {
      color: var(--dark-blue);
      background: var(--light-blue);
    }

    .search-icon-button:active {
      transform: scale(0.93);
    }

    .search-icon-button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.25);
      outline-offset: -3px;
    }

    .search-icon-button svg {
      width: 21px;
      height: 21px;
    }

    /* 範囲指定エリア */
    .range-section {
      display: grid;
      grid-template-columns:
        repeat(3, minmax(0, 1fr));
      gap: 13px;
      margin-top: 12px;
    }

    .range-card {
      min-width: 0;
      padding: 13px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 11px;
    }

    .range-card label {
      margin: 0;
    }

    .range-value {
      min-height: 21px;
      margin-top: 4px;
      color: var(--main-blue);
      font-size: 13px;
      font-weight: 700;
      text-align: right;
    }

    /*
      2つのrange入力を重ねて
      両端に丸があるスライダーを作る
    */
    .dual-range {
      position: relative;
      height: 30px;
      margin-top: 7px;
    }

    .slider-track,
    .slider-selected {
      position: absolute;
      top: 13px;
      right: 0;
      left: 0;
      height: 5px;
      border-radius: 999px;
    }

    .slider-track {
      background: #dbe4f0;
    }

    .slider-selected {
      background: var(--main-blue);
    }

    .dual-range input[type="range"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 30px;
      margin: 0;
      padding: 0;
      appearance: none;
      -webkit-appearance: none;
      pointer-events: none;
      background: transparent;
      outline: none;
    }

    .dual-range input[type="range"]::-webkit-slider-runnable-track {
      height: 5px;
      background: transparent;
    }

    .dual-range input[type="range"]::-webkit-slider-thumb {
      width: 18px;
      height: 18px;
      margin-top: -6.5px;
      appearance: none;
      -webkit-appearance: none;
      pointer-events: auto;
      background: var(--main-blue);
      border: 3px solid white;
      border-radius: 50%;
      box-shadow:
        0 1px 5px rgba(15, 23, 42, 0.35);
      cursor: pointer;
    }

    .dual-range input[type="range"]::-moz-range-track {
      height: 5px;
      background: transparent;
    }

    .dual-range input[type="range"]::-moz-range-thumb {
      width: 13px;
      height: 13px;
      pointer-events: auto;
      background: var(--main-blue);
      border: 3px solid white;
      border-radius: 50%;
      box-shadow:
        0 1px 5px rgba(15, 23, 42, 0.35);
      cursor: pointer;
    }

    .range-scale {
      display: flex;
      justify-content: space-between;
      margin-top: 1px;
      color: #64748b;
      font-size: 11px;
    }

    /* チェックボックス */
    .evaluation-options {
      margin-top: 13px;
      padding: 12px 14px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 11px;
    }

    .evaluation-options-title {
      margin: 0 0 9px;
      font-size: 14px;
      font-weight: 700;
    }

    .check-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
    }

    .check-item {
      position: relative;
      display: inline-flex;
      align-items: center;
      margin: 0;
      cursor: pointer;
    }

    .check-item input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    .check-label {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 11px;
      color: #334155;
      font-size: 13px;
      font-weight: 600;
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 999px;
      transition:
        color 0.2s,
        background 0.2s,
        border-color 0.2s;
    }

    .check-item input:checked + .check-label {
      color: white;
      background: var(--main-blue);
      border-color: var(--main-blue);
    }

    .check-item input:focus-visible + .check-label {
      outline: 3px solid rgba(37, 99, 235, 0.2);
    }

    /* AIコンシェルジュ */
    .ai-box {
      margin-top: 17px;
      padding: 17px;
      background:
        linear-gradient(
          135deg,
          #f5f9ff,
          #eef4ff
        );
      border: 1px solid #cfe0ff;
      border-radius: 14px;
    }

    .ai-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    /* AIアイコン */
    .ai-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      color: white;
      background:
        linear-gradient(
          135deg,
          #2563eb,
          #4f46e5
        );
      border-radius: 10px;
      box-shadow:
        0 4px 10px rgba(37, 99, 235, 0.22);
    }

    .ai-icon svg {
      width: 21px;
      height: 21px;
    }

    .ai-title {
      margin: 0;
      color: #163c79;
      font-size: 19px;
    }

    .ai-subtitle {
      margin: 0 0 6px;
      color: #334155;
      font-size: 15px;
      font-weight: 700;
    }

    .ai-description {
      margin: 0 0 9px;
      color: var(--sub-text);
      font-size: 13px;
      line-height: 1.6;
    }

    .ai-input-area {
      display: flex;
      align-items: stretch;
      overflow: hidden;
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 11px;
      transition:
        border-color 0.2s,
        box-shadow 0.2s;
    }

    .ai-input-area:focus-within {
      border-color: var(--main-blue);
      box-shadow:
        0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    textarea {
      flex: 1;
      width: 100%;
      min-width: 0;
      min-height: 87px;
      padding: 10px 12px;
      resize: vertical;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      background: transparent;
      border: none;
      outline: none;
    }

    .ai-input-area .search-icon-button {
      width: 48px;
      min-height: 87px;
      border-left: 1px solid #e2e8f0;
    }

    .input-examples {
      margin-top: 8px;
      color: var(--sub-text);
      font-size: 13px;
      line-height: 1.65;
    }

    .input-examples-title {
      color: #334155;
      font-weight: 700;
    }

    .input-examples ul {
      margin: 2px 0 0;
      padding: 0;
      list-style: none;
    }

    .input-examples li::before {
      content: "・";
    }

    .error-message {
      display: none;
      margin-top: 8px;
      color: #b91c1c;
      font-size: 13px;
      font-weight: 700;
    }

    /* スマートフォン */
    @media (max-width: 680px) {
      header {
        padding: 15px 19px;
      }

      header h1 {
        font-size: 22px;
      }

      .container {
        margin: 12px auto;
      }

      .main-card {
        padding: 16px;
        border-radius: 13px;
      }

      .range-section {
        grid-template-columns: 1fr;
        gap: 9px;
      }

      .check-list {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
      }

      .check-label {
        justify-content: center;
        width: 100%;
      }

      .ai-box {
        margin-top: 15px;
        padding: 14px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>最適授業サーチ</h1>

    <p>
      先輩レビューから、自分に合った授業選びをサポート
    </p>
  </header>

  <main class="container">

    <section class="main-card">

      <h2>条件から探す</h2>

      <form
        id="searchForm"
        action="results.html"
        method="get"
      >

        <label for="keyword">
          キーワード
        </label>

        <div class="keyword-search">

          <input
            type="search"
            id="keyword"
            name="keyword"
            autocomplete="off"
            aria-label="授業名や先生名を入力"
          >

          <button
            type="submit"
            class="search-icon-button"
            aria-label="条件を検索する"
            title="検索する"
          >
            <!-- 共通の虫眼鏡アイコン -->
            <svg
              viewBox="0 0 24 24"
              fill="none"
              aria-hidden="true"
            >
              <circle
                cx="10.8"
                cy="10.8"
                r="6.8"
                stroke="currentColor"
                stroke-width="2"
              ></circle>

              <path
                d="M15.8 15.8L21 21"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              ></path>
            </svg>
          </button>

        </div>

        <!-- 割合の範囲指定 -->
        <div class="range-section">

          <!-- 試験割合 -->
          <div class="range-card">

            <label>
              試験割合
            </label>

            <div
              class="range-value"
              id="testValue"
            >
              0％〜100％
            </div>

            <div
              class="dual-range"
              data-range-group="test"
            >
              <div class="slider-track"></div>
              <div
                class="slider-selected"
                id="testSelected"
              ></div>

              <input
                type="range"
                id="testMinRange"
                min="0"
                max="100"
                step="10"
                value="0"
                aria-label="試験割合の最低値"
              >

              <input
                type="range"
                id="testMaxRange"
                min="0"
                max="100"
                step="10"
                value="100"
                aria-label="試験割合の最高値"
              >
            </div>

            <div class="range-scale">
              <span>0％</span>
              <span>100％</span>
            </div>

            <input
              type="hidden"
              id="minTest"
              name="minTest"
              value="0"
            >

            <input
              type="hidden"
              id="maxTest"
              name="maxTest"
              value="100"
            >

          </div>

          <!-- レポート割合 -->
          <div class="range-card">

            <label>
              レポート割合
            </label>

            <div
              class="range-value"
              id="reportValue"
            >
              0％〜100％
            </div>

            <div
              class="dual-range"
              data-range-group="report"
            >
              <div class="slider-track"></div>
              <div
                class="slider-selected"
                id="reportSelected"
              ></div>

              <input
                type="range"
                id="reportMinRange"
                min="0"
                max="100"
                step="10"
                value="0"
                aria-label="レポート割合の最低値"
              >

              <input
                type="range"
                id="reportMaxRange"
                min="0"
                max="100"
                step="10"
                value="100"
                aria-label="レポート割合の最高値"
              >
            </div>

            <div class="range-scale">
              <span>0％</span>
              <span>100％</span>
            </div>

            <input
              type="hidden"
              id="minReport"
              name="minReport"
              value="0"
            >

            <input
              type="hidden"
              id="maxReport"
              name="maxReport"
              value="100"
            >

          </div>

          <!-- 課題割合 -->
          <div class="range-card">

            <label>
              課題割合
            </label>

            <div
              class="range-value"
              id="assignmentValue"
            >
              0％〜100％
            </div>

            <div
              class="dual-range"
              data-range-group="assignment"
            >
              <div class="slider-track"></div>
              <div
                class="slider-selected"
                id="assignmentSelected"
              ></div>

              <input
                type="range"
                id="assignmentMinRange"
                min="0"
                max="100"
                step="10"
                value="0"
                aria-label="課題割合の最低値"
              >

              <input
                type="range"
                id="assignmentMaxRange"
                min="0"
                max="100"
                step="10"
                value="100"
                aria-label="課題割合の最高値"
              >
            </div>

            <div class="range-scale">
              <span>0％</span>
              <span>100％</span>
            </div>

            <input
              type="hidden"
              id="minAssignment"
              name="minAssignment"
              value="0"
            >

            <input
              type="hidden"
              id="maxAssignment"
              name="maxAssignment"
              value="100"
            >

          </div>

        </div>

        <!-- その他の評価方法 -->
        <div class="evaluation-options">

          <p class="evaluation-options-title">
            その他の評価方法を含む
          </p>

          <div class="check-list">

            <label class="check-item">
              <input
                type="checkbox"
                name="includePresentation"
                value="1"
              >
              <span class="check-label">
                発表
              </span>
            </label>

            <label class="check-item">
              <input
                type="checkbox"
                name="includePractice"
                value="1"
              >
              <span class="check-label">
                演習
              </span>
            </label>

            <label class="check-item">
              <input
                type="checkbox"
                name="includeQuiz"
                value="1"
              >
              <span class="check-label">
                小テスト
              </span>
            </label>

            <label class="check-item">
              <input
                type="checkbox"
                name="includeOther"
                value="1"
              >
              <span class="check-label">
                その他
              </span>
            </label>

          </div>

        </div>

      </form>

      <!-- AI授業コンシェルジュ -->
      <section class="ai-box">

        <div class="ai-title-row">

          <div
            class="ai-icon"
            aria-hidden="true"
          >
            <!-- AI・推薦を表す星型アイコン -->
            <svg
              viewBox="0 0 24 24"
              fill="none"
            >
              <path
                d="M12 3L13.6 8.4L19 10L13.6 11.6L12 17L10.4 11.6L5 10L10.4 8.4L12 3Z"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              ></path>

              <path
                d="M18.5 15L19.3 17.7L22 18.5L19.3 19.3L18.5 22L17.7 19.3L15 18.5L17.7 17.7L18.5 15Z"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linejoin="round"
              ></path>
            </svg>
          </div>

          <h2 class="ai-title">
            AI授業コンシェルジュ
          </h2>

        </div>

        <p class="ai-subtitle">
          文章で相談して探す
        </p>

        <p class="ai-description">
          まだ条件がはっきり決まっていない場合は、
          希望を文章で入力するとおすすめ授業を提案します。
        </p>

        <label for="aiText">
          相談内容
        </label>

        <div class="ai-input-area">

          <textarea
            id="aiText"
            aria-describedby="aiError"
          ></textarea>

          <button
            type="button"
            class="search-icon-button"
            id="aiSubmitButton"
            aria-label="AIに相談する"
            title="AIに相談する"
          >
            <!-- 上と同じ虫眼鏡アイコン -->
            <svg
              viewBox="0 0 24 24"
              fill="none"
              aria-hidden="true"
            >
              <circle
                cx="10.8"
                cy="10.8"
                r="6.8"
                stroke="currentColor"
                stroke-width="2"
              ></circle>

              <path
                d="M15.8 15.8L21 21"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              ></path>
            </svg>
          </button>

        </div>

        <div class="input-examples">

          <div class="input-examples-title">
            入力例
          </div>

          <ul>
            <li>
              Pythonを使ったプログラミングを学びたい
            </li>

            <li>
              データ分析やAIに関する授業を履修したい
            </li>

            <li>
              レポートを中心に学習を進められる授業を探したい
            </li>
          </ul>

        </div>

        <div
          id="aiError"
          class="error-message"
          role="alert"
        >
          相談内容を入力してください。
        </div>

      </section>

    </section>

  </main>

  <script>
    const searchForm =
      document.getElementById("searchForm");

    /*
      両端スライダーを設定する関数
    */
    function setupDualRange(config) {
      const minSlider =
        document.getElementById(config.minSliderId);

      const maxSlider =
        document.getElementById(config.maxSliderId);

      const minHidden =
        document.getElementById(config.minHiddenId);

      const maxHidden =
        document.getElementById(config.maxHiddenId);

      const valueDisplay =
        document.getElementById(config.valueDisplayId);

      const selectedTrack =
        document.getElementById(config.selectedTrackId);

      function updateRange(changedSlider) {
        let minValue =
          Number(minSlider.value);

        let maxValue =
          Number(maxSlider.value);

        /*
          最低値が最高値を超えないようにする
        */
        if (minValue > maxValue) {
          if (changedSlider === minSlider) {
            maxValue = minValue;
            maxSlider.value = String(maxValue);
          } else {
            minValue = maxValue;
            minSlider.value = String(minValue);
          }
        }

        minHidden.value = String(minValue);
        maxHidden.value = String(maxValue);

        /*
          表示テキスト
        */
        if (minValue === 0 && maxValue === 0) {
          valueDisplay.textContent =
            config.noneText;
        } else if (
          minValue === 0 &&
          maxValue === 100
        ) {
          valueDisplay.textContent =
            "指定なし";
        } else if (minValue === maxValue) {
          valueDisplay.textContent =
            minValue + "％";
        } else {
          valueDisplay.textContent =
            minValue +
            "％〜" +
            maxValue +
            "％";
        }

        /*
          青く表示する範囲を更新
        */
        selectedTrack.style.left =
          minValue + "%";

        selectedTrack.style.right =
          (100 - maxValue) + "%";
      }

      minSlider.addEventListener(
        "input",
        function () {
          updateRange(minSlider);
        }
      );

      maxSlider.addEventListener(
        "input",
        function () {
          updateRange(maxSlider);
        }
      );

      updateRange();
    }

    setupDualRange({
      minSliderId: "testMinRange",
      maxSliderId: "testMaxRange",
      minHiddenId: "minTest",
      maxHiddenId: "maxTest",
      valueDisplayId: "testValue",
      selectedTrackId: "testSelected",
      noneText: "試験なし"
    });

    setupDualRange({
      minSliderId: "reportMinRange",
      maxSliderId: "reportMaxRange",
      minHiddenId: "minReport",
      maxHiddenId: "maxReport",
      valueDisplayId: "reportValue",
      selectedTrackId: "reportSelected",
      noneText: "レポートなし"
    });

    setupDualRange({
      minSliderId: "assignmentMinRange",
      maxSliderId: "assignmentMaxRange",
      minHiddenId: "minAssignment",
      maxHiddenId: "maxAssignment",
      valueDisplayId: "assignmentValue",
      selectedTrackId: "assignmentSelected",
      noneText: "課題なし"
    });

    /*
      AI相談ページへの移動
    */
    const aiText =
      document.getElementById("aiText");

    const aiSubmitButton =
      document.getElementById("aiSubmitButton");

    const aiError =
      document.getElementById("aiError");

    function openAiPage() {
      const text =
        aiText.value.trim();

      if (!text) {
        aiError.style.display = "block";
        aiText.focus();
        return;
      }

      aiError.style.display = "none";

      window.location.href =
        "ai.html?text=" +
        encodeURIComponent(text);
    }

    aiSubmitButton.addEventListener(
      "click",
      openAiPage
    );

    /*
      Ctrl＋EnterまたはCommand＋Enterでも送信
    */
    aiText.addEventListener(
      "keydown",
      function (event) {
        if (
          event.key === "Enter" &&
          (event.ctrlKey || event.metaKey)
        ) {
          event.preventDefault();
          openAiPage();
        }
      }
    );

    aiText.addEventListener(
      "input",
      function () {
        if (aiText.value.trim()) {
          aiError.style.display = "none";
        }
      }
    );

    /*
      検索直前に値が入っていることを確認
    */
    searchForm.addEventListener(
      "submit",
      function () {
        console.log(
          "条件検索を実行します"
        );
      }
    );
  </script>

</body>

</html>
