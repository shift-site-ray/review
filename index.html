<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>最適授業サーチ</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family:
        "Segoe UI",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      background: #f4f7fb;
      color: #111827;
    }

    /* ヘッダー */
    header {
      padding: 18px 32px;
      color: white;
      background:
        linear-gradient(
          90deg,
          #003b8f,
          #0057d9
        );
    }

    header h1 {
      margin: 0;
      font-size: 26px;
    }

    header p {
      margin: 4px 0 0;
      font-size: 14px;
      opacity: 0.95;
    }

    /* 全体 */
    .container {
      width: min(760px, calc(100% - 28px));
      margin: 18px auto;
    }

    .main-card {
      padding: 22px;
      background: white;
      border-radius: 16px;
      box-shadow:
        0 5px 18px rgba(15, 23, 42, 0.08);
    }

    h2 {
      margin: 0 0 16px;
      font-size: 21px;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-size: 14px;
      font-weight: 700;
    }

    /* キーワード検索 */
    .keyword-search {
      display: flex;
      align-items: center;
      width: 100%;
      height: 46px;
      overflow: hidden;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 11px;
      transition:
        border-color 0.2s,
        box-shadow 0.2s;
    }

    .keyword-search:focus-within {
      border-color: #2563eb;
      box-shadow:
        0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .keyword-search input {
      flex: 1;
      height: 100%;
      min-width: 0;
      padding: 0 13px;
      font-size: 15px;
      border: none;
      outline: none;
      background: transparent;
    }

    .search-icon-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 100%;
      padding: 0;
      color: #2563eb;
      background: transparent;
      border: none;
      cursor: pointer;
      transition:
        color 0.2s,
        background 0.2s;
    }

    .search-icon-button:hover {
      color: #1d4ed8;
      background: #eff6ff;
    }

    .search-icon-button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.25);
      outline-offset: -3px;
    }

    .search-icon-button svg {
      width: 21px;
      height: 21px;
    }

    /* 条件欄 */
    .condition-grid {
      display: grid;
      grid-template-columns:
        repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 5px;
    }

    .condition-item label {
      margin-top: 10px;
    }

    select {
      width: 100%;
      height: 42px;
      padding: 0 10px;
      font-size: 14px;
      color: #111827;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 9px;
      outline: none;
    }

    select:focus {
      border-color: #2563eb;
      box-shadow:
        0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    /* 区切り */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 22px 0;
      color: #64748b;
      font-size: 13px;
      font-weight: 700;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    /* AI相談 */
    .ai-box {
      padding: 18px;
      background:
        linear-gradient(
          135deg,
          #f5f9ff,
          #eef4ff
        );
      border: 1px solid #cfe0ff;
      border-radius: 14px;
    }

    .ai-title-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 5px;
    }

    .ai-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      font-size: 18px;
      background: white;
      border-radius: 50%;
      box-shadow:
        0 2px 8px rgba(37, 99, 235, 0.12);
    }

    .ai-title {
      margin: 0;
      color: #163c79;
      font-size: 19px;
    }

    .ai-subtitle {
      margin: 0 0 7px;
      color: #334155;
      font-size: 15px;
      font-weight: 700;
    }

    .ai-description {
      margin: 0 0 12px;
      color: #475569;
      font-size: 13px;
      line-height: 1.65;
    }

    textarea {
      width: 100%;
      min-height: 92px;
      padding: 11px 12px;
      resize: vertical;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      outline: none;
    }

    textarea:focus {
      border-color: #2563eb;
      box-shadow:
        0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .input-examples {
      margin: 9px 0 0;
      padding: 0;
      color: #475569;
      font-size: 13px;
      line-height: 1.7;
      list-style: none;
    }

    .input-examples-title {
      color: #334155;
      font-weight: 700;
    }

    .input-examples li::before {
      content: "・";
    }

    .ai-button {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 11px 16px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      background:
        linear-gradient(
          90deg,
          #0057d9,
          #2563eb
        );
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition:
        transform 0.2s,
        box-shadow 0.2s;
    }

    .ai-button:hover {
      transform: translateY(-1px);
      box-shadow:
        0 5px 12px rgba(37, 99, 235, 0.22);
    }

    .error-message {
      display: none;
      margin-top: 9px;
      color: #b91c1c;
      font-size: 13px;
      font-weight: 700;
    }

    /* スマートフォン */
    @media (max-width: 650px) {
      header {
        padding: 16px 20px;
      }

      header h1 {
        font-size: 23px;
      }

      .container {
        margin: 13px auto;
      }

      .main-card {
        padding: 17px;
        border-radius: 13px;
      }

      .condition-grid {
        grid-template-columns: 1fr;
        gap: 2px;
      }

      .ai-box {
        padding: 15px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>最適授業サーチ</h1>

    <p>
      先輩レビューから、自分に合った授業選びをサポート
    </p>
  </header>

  <main class="container">

    <section class="main-card">

      <!-- 条件検索 -->
      <h2>条件から探す</h2>

      <form
        id="searchForm"
        action="results.html"
        method="get"
      >

        <label for="keyword">
          キーワード
        </label>

        <div class="keyword-search">

          <input
            type="search"
            id="keyword"
            name="keyword"
            autocomplete="off"
            aria-label="授業名や先生名などを入力"
          >

          <button
            type="submit"
            class="search-icon-button"
            aria-label="検索する"
            title="検索する"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              aria-hidden="true"
            >
              <circle
                cx="11"
                cy="11"
                r="7"
                stroke="currentColor"
                stroke-width="2"
              ></circle>

              <path
                d="M16.5 16.5L21 21"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              ></path>
            </svg>
          </button>

        </div>

        <div class="condition-grid">

          <div class="condition-item">

            <label for="attendance">
              出席の厳しさ
            </label>

            <select
              id="attendance"
              name="attendance"
            >
              <option value="">
                指定なし
              </option>

              <option value="厳しくない">
                厳しくない
              </option>

              <option value="普通">
                普通
              </option>

              <option value="厳しい">
                厳しい
              </option>
            </select>

          </div>

          <div class="condition-item">

            <label for="testRange">
              試験割合
            </label>

            <select id="testRange">
              <option
                value="0,100"
                selected
              >
                指定なし
              </option>

              <option value="0,20">
                20％以下
              </option>

              <option value="21,50">
                21～50％
              </option>

              <option value="51,100">
                51％以上
              </option>
            </select>

            <input
              type="hidden"
              id="minTest"
              name="minTest"
              value="0"
            >

            <input
              type="hidden"
              id="maxTest"
              name="maxTest"
              value="100"
            >

          </div>

          <div class="condition-item">

            <label for="reportRange">
              レポート割合
            </label>

            <select id="reportRange">
              <option
                value="0,100"
                selected
              >
                指定なし
              </option>

              <option value="0,20">
                20％以下
              </option>

              <option value="21,50">
                21～50％
              </option>

              <option value="51,100">
                51％以上
              </option>
            </select>

            <input
              type="hidden"
              id="minReport"
              name="minReport"
              value="0"
            >

            <input
              type="hidden"
              id="maxReport"
              name="maxReport"
              value="100"
            >

          </div>

        </div>

      </form>

      <div class="divider">
        または
      </div>

      <!-- AI授業コンシェルジュ -->
      <section class="ai-box">

        <div class="ai-title-row">

          <div class="ai-icon" aria-hidden="true">
            🤖
          </div>

          <h2 class="ai-title">
            AI授業コンシェルジュ
          </h2>

        </div>

        <p class="ai-subtitle">
          文章で相談して探す
        </p>

        <p class="ai-description">
          まだ条件がはっきり決まっていない場合は、
          希望を文章で入力するとおすすめ授業を提案します。
        </p>

        <label for="aiText">
          相談内容
        </label>

        <textarea
          id="aiText"
          aria-describedby="aiError"
        ></textarea>

        <div class="input-examples">

          <div class="input-examples-title">
            入力例
          </div>

          <ul class="input-examples">
            <li>
              Pythonを使ったプログラミングを学びたい
            </li>

            <li>
              データ分析やAIに関する授業を履修したい
            </li>

            <li>
              レポートを中心に学習を進められる授業を探したい
            </li>
          </ul>

        </div>

        <button
          type="button"
          class="ai-button"
          id="aiSubmitButton"
        >
          AIにおすすめしてもらう
        </button>

        <div
          id="aiError"
          class="error-message"
          role="alert"
        >
          相談内容を入力してください。
        </div>

      </section>

    </section>

  </main>

  <script>
    const searchForm =
      document.getElementById("searchForm");

    const testRange =
      document.getElementById("testRange");

    const reportRange =
      document.getElementById("reportRange");

    const minTest =
      document.getElementById("minTest");

    const maxTest =
      document.getElementById("maxTest");

    const minReport =
      document.getElementById("minReport");

    const maxReport =
      document.getElementById("maxReport");

    const aiText =
      document.getElementById("aiText");

    const aiSubmitButton =
      document.getElementById("aiSubmitButton");

    const aiError =
      document.getElementById("aiError");

    /*
      試験割合・レポート割合を
      results.html が使用する形式へ変換
    */
    function updateRangeValues() {
      const [selectedMinTest, selectedMaxTest] =
        testRange.value.split(",");

      const [selectedMinReport, selectedMaxReport] =
        reportRange.value.split(",");

      minTest.value = selectedMinTest;
      maxTest.value = selectedMaxTest;

      minReport.value = selectedMinReport;
      maxReport.value = selectedMaxReport;
    }

    testRange.addEventListener(
      "change",
      updateRangeValues
    );

    reportRange.addEventListener(
      "change",
      updateRangeValues
    );

    searchForm.addEventListener(
      "submit",
      function () {
        updateRangeValues();
      }
    );

    /*
      AI相談ページへ移動
    */
    function openAiPage() {
      const text = aiText.value.trim();

      if (!text) {
        aiError.style.display = "block";
        aiText.focus();
        return;
      }

      aiError.style.display = "none";

      const url =
        "ai.html?text=" +
        encodeURIComponent(text);

      window.location.href = url;
    }

    aiSubmitButton.addEventListener(
      "click",
      openAiPage
    );

    /*
      AI相談欄では
      Ctrl＋Enter または Command＋Enterで送信
    */
    aiText.addEventListener(
      "keydown",
      function (event) {
        if (
          event.key === "Enter" &&
          (event.ctrlKey || event.metaKey)
        ) {
          event.preventDefault();
          openAiPage();
        }
      }
    );

    aiText.addEventListener(
      "input",
      function () {
        if (aiText.value.trim()) {
          aiError.style.display = "none";
        }
      }
    );

    updateRangeValues();
  </script>

</body>

</html>
