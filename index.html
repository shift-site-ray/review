<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>最適授業サーチ</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family:
        "Segoe UI",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      color: #111827;
      background: #f4f7fb;
    }

    /* ヘッダー */
    header {
      padding: 17px 30px;
      color: white;
      background:
        linear-gradient(
          90deg,
          #003b8f,
          #0057d9
        );
    }

    header h1 {
      margin: 0;
      font-size: 25px;
    }

    header p {
      margin: 4px 0 0;
      font-size: 13px;
      opacity: 0.95;
    }

    /* ページ全体 */
    .container {
      width: min(760px, calc(100% - 28px));
      margin: 16px auto;
    }

    .main-card {
      padding: 21px;
      background: white;
      border-radius: 15px;
      box-shadow:
        0 5px 18px rgba(15, 23, 42, 0.08);
    }

    h2 {
      margin: 0 0 14px;
      font-size: 21px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 14px;
      font-weight: 700;
    }

    /* キーワード検索 */
    .keyword-search {
      display: flex;
      align-items: center;
      width: 100%;
      height: 45px;
      overflow: hidden;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 11px;
      transition:
        border-color 0.2s,
        box-shadow 0.2s;
    }

    .keyword-search:focus-within {
      border-color: #2563eb;
      box-shadow:
        0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .keyword-search input {
      flex: 1;
      height: 100%;
      min-width: 0;
      padding: 0 13px;
      font-size: 15px;
      border: none;
      outline: none;
      background: transparent;
    }

    /* 共通の虫眼鏡ボタン */
    .search-icon-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 100%;
      padding: 0;
      color: #2563eb;
      background: transparent;
      border: none;
      cursor: pointer;
      transition:
        color 0.2s,
        background 0.2s,
        transform 0.2s;
    }

    .search-icon-button:hover {
      color: #1d4ed8;
      background: #eff6ff;
    }

    .search-icon-button:active {
      transform: scale(0.94);
    }

    .search-icon-button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.25);
      outline-offset: -3px;
    }

    .search-icon-button svg {
      width: 21px;
      height: 21px;
    }

    /* 割合スライダー */
    .range-section {
      display: grid;
      grid-template-columns:
        repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 9px;
    }

    .range-card {
      padding: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 11px;
    }

    .range-card label {
      margin: 0 0 8px;
    }

    .range-value {
      margin-bottom: 5px;
      color: #2563eb;
      font-size: 14px;
      font-weight: 700;
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      margin: 4px 0;
      appearance: none;
      -webkit-appearance: none;
      background: #dbe4f0;
      border-radius: 999px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      width: 18px;
      height: 18px;
      appearance: none;
      -webkit-appearance: none;
      background: #2563eb;
      border: 3px solid white;
      border-radius: 50%;
      box-shadow:
        0 1px 5px rgba(15, 23, 42, 0.3);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #2563eb;
      border: 3px solid white;
      border-radius: 50%;
      box-shadow:
        0 1px 5px rgba(15, 23, 42, 0.3);
      cursor: pointer;
    }

    .range-scale {
      display: flex;
      justify-content: space-between;
      margin-top: 2px;
      color: #64748b;
      font-size: 11px;
    }

    /* AIコンシェルジュ */
    .ai-box {
      margin-top: 18px;
      padding: 17px;
      background:
        linear-gradient(
          135deg,
          #f5f9ff,
          #eef4ff
        );
      border: 1px solid #cfe0ff;
      border-radius: 14px;
    }

    .ai-title-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 4px;
    }

    .ai-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      font-size: 18px;
      background: white;
      border-radius: 50%;
      box-shadow:
        0 2px 8px rgba(37, 99, 235, 0.12);
    }

    .ai-title {
      margin: 0;
      color: #163c79;
      font-size: 19px;
    }

    .ai-subtitle {
      margin: 0 0 6px;
      color: #334155;
      font-size: 15px;
      font-weight: 700;
    }

    .ai-description {
      margin: 0 0 10px;
      color: #475569;
      font-size: 13px;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      min-height: 87px;
      padding: 10px 12px;
      resize: vertical;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      outline: none;
    }

    textarea:focus {
      border-color: #2563eb;
      box-shadow:
        0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    /* AI入力欄と虫眼鏡 */
    .ai-input-area {
      position: relative;
    }

    .ai-input-area textarea {
      padding-right: 54px;
    }

    .ai-search-button {
      position: absolute;
      right: 7px;
      bottom: 8px;
      width: 40px;
      height: 40px;
      color: white;
      background: #2563eb;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      transition:
        background 0.2s,
        transform 0.2s,
        box-shadow 0.2s;
    }

    .ai-search-button:hover {
      background: #1d4ed8;
      transform: scale(1.04);
      box-shadow:
        0 4px 10px rgba(37, 99, 235, 0.25);
    }

    .ai-search-button:active {
      transform: scale(0.95);
    }

    .ai-search-button svg {
      width: 20px;
      height: 20px;
    }

    .input-examples {
      margin: 8px 0 0;
      padding: 0;
      color: #475569;
      font-size: 13px;
      line-height: 1.65;
      list-style: none;
    }

    .input-examples-title {
      color: #334155;
      font-weight: 700;
    }

    .input-examples ul {
      margin: 2px 0 0;
      padding: 0;
      list-style: none;
    }

    .input-examples li::before {
      content: "・";
    }

    .error-message {
      display: none;
      margin-top: 8px;
      color: #b91c1c;
      font-size: 13px;
      font-weight: 700;
    }

    /* スマートフォン */
    @media (max-width: 650px) {
      header {
        padding: 15px 19px;
      }

      header h1 {
        font-size: 22px;
      }

      .container {
        margin: 12px auto;
      }

      .main-card {
        padding: 16px;
        border-radius: 13px;
      }

      .range-section {
        grid-template-columns: 1fr;
        gap: 9px;
      }

      .ai-box {
        margin-top: 15px;
        padding: 14px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>最適授業サーチ</h1>

    <p>
      先輩レビューから、自分に合った授業選びをサポート
    </p>
  </header>

  <main class="container">

    <section class="main-card">

      <!-- 条件検索 -->
      <h2>条件から探す</h2>

      <form
        id="searchForm"
        action="results.html"
        method="get"
      >

        <label for="keyword">
          キーワード
        </label>

        <div class="keyword-search">

          <input
            type="search"
            id="keyword"
            name="keyword"
            autocomplete="off"
            aria-label="授業名や先生名を入力"
          >

          <button
            type="submit"
            class="search-icon-button"
            aria-label="条件を検索する"
            title="検索する"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              aria-hidden="true"
            >
              <circle
                cx="11"
                cy="11"
                r="7"
                stroke="currentColor"
                stroke-width="2"
              ></circle>

              <path
                d="M16.5 16.5L21 21"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              ></path>
            </svg>
          </button>

        </div>

        <!-- 割合スライダー -->
        <div class="range-section">

          <!-- 試験割合 -->
          <div class="range-card">

            <label for="testRange">
              試験割合
            </label>

            <div
              class="range-value"
              id="testValue"
            >
              100％以下
            </div>

            <input
              type="range"
              id="testRange"
              min="0"
              max="100"
              step="10"
              value="100"
            >

            <div class="range-scale">
              <span>0％</span>
              <span>100％</span>
            </div>

            <input
              type="hidden"
              id="minTest"
              name="minTest"
              value="0"
            >

            <input
              type="hidden"
              id="maxTest"
              name="maxTest"
              value="100"
            >

          </div>

          <!-- レポート割合 -->
          <div class="range-card">

            <label for="reportRange">
              レポート割合
            </label>

            <div
              class="range-value"
              id="reportValue"
            >
              100％以下
            </div>

            <input
              type="range"
              id="reportRange"
              min="0"
              max="100"
              step="10"
              value="100"
            >

            <div class="range-scale">
              <span>0％</span>
              <span>100％</span>
            </div>

            <input
              type="hidden"
              id="minReport"
              name="minReport"
              value="0"
            >

            <input
              type="hidden"
              id="maxReport"
              name="maxReport"
              value="100"
            >

          </div>

          <!-- 課題割合 -->
          <div class="range-card">

            <label for="assignmentRange">
              課題割合
            </label>

            <div
              class="range-value"
              id="assignmentValue"
            >
              100％以下
            </div>

            <input
              type="range"
              id="assignmentRange"
              min="0"
              max="100"
              step="10"
              value="100"
            >

            <div class="range-scale">
              <span>0％</span>
              <span>100％</span>
            </div>

            <input
              type="hidden"
              id="minAssignment"
              name="minAssignment"
              value="0"
            >

            <input
              type="hidden"
              id="maxAssignment"
              name="maxAssignment"
              value="100"
            >

          </div>

        </div>

      </form>

      <!-- AI授業コンシェルジュ -->
      <section class="ai-box">

        <div class="ai-title-row">

          <div
            class="ai-icon"
            aria-hidden="true"
          >
            🤖
          </div>

          <h2 class="ai-title">
            AI授業コンシェルジュ
          </h2>

        </div>

        <p class="ai-subtitle">
          文章で相談して探す
        </p>

        <p class="ai-description">
          まだ条件がはっきり決まっていない場合は、
          希望を文章で入力するとおすすめ授業を提案します。
        </p>

        <label for="aiText">
          相談内容
        </label>

        <div class="ai-input-area">

          <textarea
            id="aiText"
            aria-describedby="aiError"
          ></textarea>

          <button
            type="button"
            class="ai-search-button"
            id="aiSubmitButton"
            aria-label="AIに相談する"
            title="AIに相談する"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              aria-hidden="true"
            >
              <circle
                cx="11"
                cy="11"
                r="7"
                stroke="currentColor"
                stroke-width="2"
              ></circle>

              <path
                d="M16.5 16.5L21 21"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              ></path>
            </svg>
          </button>

        </div>

        <div class="input-examples">

          <div class="input-examples-title">
            入力例
          </div>

          <ul>
            <li>
              Pythonを使ったプログラミングを学びたい
            </li>

            <li>
              データ分析やAIに関する授業を履修したい
            </li>

            <li>
              レポートを中心に学習を進められる授業を探したい
            </li>
          </ul>

        </div>

        <div
          id="aiError"
          class="error-message"
          role="alert"
        >
          相談内容を入力してください。
        </div>

      </section>

    </section>

  </main>

  <script>
    const searchForm =
      document.getElementById("searchForm");

    const testRange =
      document.getElementById("testRange");

    const reportRange =
      document.getElementById("reportRange");

    const assignmentRange =
      document.getElementById("assignmentRange");

    const testValue =
      document.getElementById("testValue");

    const reportValue =
      document.getElementById("reportValue");

    const assignmentValue =
      document.getElementById("assignmentValue");

    const maxTest =
      document.getElementById("maxTest");

    const maxReport =
      document.getElementById("maxReport");

    const maxAssignment =
      document.getElementById("maxAssignment");

    const aiText =
      document.getElementById("aiText");

    const aiSubmitButton =
      document.getElementById("aiSubmitButton");

    const aiError =
      document.getElementById("aiError");

    /*
      スライダーの数値を表示し、
      results.htmlへ送る値を更新
    */
    function updateRangeValues() {
      const test =
        Number(testRange.value);

      const report =
        Number(reportRange.value);

      const assignment =
        Number(assignmentRange.value);

      testValue.textContent =
        test === 100
          ? "指定なし"
          : test + "％以下";

      reportValue.textContent =
        report === 100
          ? "指定なし"
          : report + "％以下";

      assignmentValue.textContent =
        assignment === 100
          ? "指定なし"
          : assignment + "％以下";

      maxTest.value = test;
      maxReport.value = report;
      maxAssignment.value = assignment;
    }

    testRange.addEventListener(
      "input",
      updateRangeValues
    );

    reportRange.addEventListener(
      "input",
      updateRangeValues
    );

    assignmentRange.addEventListener(
      "input",
      updateRangeValues
    );

    searchForm.addEventListener(
      "submit",
      function () {
        updateRangeValues();
      }
    );

    /*
      AI相談ページへ移動
    */
    function openAiPage() {
      const text =
        aiText.value.trim();

      if (!text) {
        aiError.style.display = "block";
        aiText.focus();
        return;
      }

      aiError.style.display = "none";

      const url =
        "ai.html?text=" +
        encodeURIComponent(text);

      window.location.href = url;
    }

    aiSubmitButton.addEventListener(
      "click",
      openAiPage
    );

    /*
      Ctrl＋Enter、またはCommand＋EnterでAI相談
    */
    aiText.addEventListener(
      "keydown",
      function (event) {
        if (
          event.key === "Enter" &&
          (event.ctrlKey || event.metaKey)
        ) {
          event.preventDefault();
          openAiPage();
        }
      }
    );

    aiText.addEventListener(
      "input",
      function () {
        if (aiText.value.trim()) {
          aiError.style.display = "none";
        }
      }
    );

    updateRangeValues();
  </script>

</body>

</html>
