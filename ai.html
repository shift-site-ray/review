<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI授業相談｜最適授業サーチ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",sans-serif;background:#f4f7fb;color:#111827}
header{background:linear-gradient(90deg,#003b8f,#0057d9);color:white;padding:24px 36px}
header h1{margin:0;font-size:28px}
header p{margin:6px 0 0;font-size:14px}
.container{max-width:900px;margin:28px auto;padding:0 20px}
.back{display:inline-block;margin-bottom:18px;color:#2563eb;text-decoration:none;font-weight:700}
.card{background:white;border-radius:18px;padding:24px;margin-bottom:22px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.user-text{background:#eef6ff;border:1px solid #93c5fd;color:#0f3f8c;padding:14px;border-radius:12px;line-height:1.7;white-space:pre-wrap}
.answer{line-height:1.9;white-space:pre-wrap}
.loading{color:#64748b}
.btn{display:inline-block;margin-top:14px;background:#0057d9;color:white;padding:10px 16px;border-radius:9px;text-decoration:none;font-weight:800}
</style>
</head>

<body>

<header>
  <h1>AI授業相談</h1>
  <p>希望文をもとに、Geminiが授業を推薦します</p>
</header>

<div class="container">

<a class="back" href="index.html">← 検索画面に戻る</a>

<div class="card">
  <h2>あなたの相談内容</h2>
  <div id="userText" class="user-text"></div>
</div>

<div class="card">
  <h2>AI授業コンシェルジュ</h2>
  <div id="answer" class="answer loading">回答を生成中...</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const GEMINI_API_KEY = "AQ.Ab8RN6KgvcUHDOVJzRKsOXXRotlj67jtQoPPYnKExueemYEWgg";

const firebaseConfig = {
  apiKey: "AIzaSyCs2G-LhqC8ZrkvK5QJtYHiMGAK6rKPh9E",
  authDomain: "search-9aee7.firebaseapp.com",
  projectId: "search-9aee7",
  storageBucket: "search-9aee7.firebasestorage.app",
  messagingSenderId: "541254473766",
  appId: "1:541254473766:web:ea29fc67955cc0f4dfeee7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function getUserText(){
  const params = new URLSearchParams(location.search);
  return decodeURIComponent(params.get("text") || "");
}

async function loadClasses(){
  const res = await fetch("classes.json");
  return await res.json();
}

async function loadReviews(){
  const snap = await getDocs(collection(db, "reviews"));
  const reviews = [];
  snap.forEach(doc => reviews.push(doc.data()));
  return reviews;
}

function buildPrompt(userText, classes, reviews){
  return `
あなたは武蔵野大学工学部数理工学科の授業相談AIです。
以下の授業データと先輩レビューだけを根拠に、ユーザーに合う授業を推薦してください。
存在しない授業は絶対に紹介しないでください。

【ユーザーの希望】
${userText}

【授業データ】
${JSON.stringify(classes, null, 2)}

【先輩レビュー】
${JSON.stringify(reviews, null, 2)}

【回答ルール】
- 日本語で答える
- おすすめ授業を3つまで出す
- 各授業について「おすすめ理由」「注意点」を書く
- 「楽」「簡単」などの希望がある場合は、レビュー内の表現も根拠にする
- 最後に「詳細は授業レビュー画面で確認してください」と添える
- 断定しすぎず、「可能性があります」「向いています」のように表現する
`;
}

async function callGemini(prompt){
  const url =
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      contents: [
        {
          parts: [
            { text: prompt }
          ]
        }
      ]
    })
  });

  if(!res.ok){
    const errorText = await res.text();
    throw new Error(errorText);
  }

  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "回答を取得できませんでした。";
}

async function main(){
  const userText = getUserText();
  document.getElementById("userText").textContent = userText;

  try{
    const classes = await loadClasses();
    const reviews = await loadReviews();

    const prompt = buildPrompt(userText, classes, reviews);
    const answer = await callGemini(prompt);

    document.getElementById("answer").classList.remove("loading");
    document.getElementById("answer").innerHTML =
      answer + `\n\n<a class="btn" href="results.html?keyword=&attendance=&minTest=0&maxTest=100&minReport=0&maxReport=100">授業レビューを見る</a>`;
  }catch(error){
    console.error(error);
    document.getElementById("answer").textContent =
      "AI回答の取得に失敗しました。APIキーや通信設定を確認してください。";
  }
}

main();
</script>

</body>
</html>
