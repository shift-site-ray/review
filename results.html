<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>楽単Search｜検索結果</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:#f4f7fb;
  color:#111827;
}

header{
  background:linear-gradient(90deg,#003b8f,#0057d9);
  color:white;
  padding:22px 36px;
}

header h1{
  margin:0;
  font-size:28px;
}

header p{
  margin:6px 0 0;
  font-size:14px;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:24px;
}

.back{
  display:inline-block;
  margin-bottom:18px;
  color:#2563eb;
  text-decoration:none;
  font-weight:700;
}

.result-title{
  background:white;
  padding:18px 22px;
  border-radius:14px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
  margin-bottom:20px;
}

.card{
  background:white;
  padding:24px;
  border-radius:16px;
  margin-bottom:24px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
  border:1px solid #e5e7eb;
}

.course-title{
  font-size:26px;
  font-weight:800;
  margin:0;
}

.teacher{
  color:#475569;
  margin:8px 0;
}

.tags{
  margin:14px 0;
}

.tag{
  display:inline-block;
  background:#e9f1ff;
  color:#1e40af;
  padding:5px 9px;
  border-radius:6px;
  margin:4px 4px 4px 0;
  font-size:13px;
}

.course-body{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
  margin-top:16px;
}

.eval-row{
  display:grid;
  grid-template-columns:100px 1fr 50px;
  align-items:center;
  gap:10px;
  margin:12px 0;
}

.bar-bg{
  height:9px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
}

.bar{
  height:9px;
  background:#2563eb;
  border-radius:999px;
}

.attendance-box{
  margin-top:12px;
}

.attendance-badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  font-weight:800;
  font-size:14px;
}

.attendance-ok{
  background:#dcfce7;
  color:#166534;
}

.attendance-hard{
  background:#fee2e2;
  color:#991b1b;
}

.attendance-depends{
  background:#fef3c7;
  color:#92400e;
}

.attendance-unknown{
  background:#e5e7eb;
  color:#374151;
}

.review-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:22px;
  border-top:1px solid #e5e7eb;
  padding-top:18px;
}

.review-head h3{
  margin:0;
}

.review-card{
  display:grid;
  grid-template-columns:90px 1fr;
  gap:16px;
  padding:16px;
  margin-top:14px;
  border:1px solid #e5e7eb;
  border-radius:14px;
  background:#fbfdff;
}

.avatar{
  width:56px;
  height:56px;
  border-radius:50%;
  background:#d8e0e8;
  margin:0 auto;
  position:relative;
}

.avatar:before{
  content:"";
  position:absolute;
  top:10px;
  left:18px;
  width:20px;
  height:20px;
  background:#71808f;
  border-radius:50%;
}

.avatar:after{
  content:"";
  position:absolute;
  bottom:7px;
  left:10px;
  width:36px;
  height:21px;
  background:#71808f;
  border-radius:50% 50% 40% 40%;
}

.year{
  text-align:center;
  font-size:12px;
  margin-top:7px;
  color:#475569;
}

.year span{
  display:inline-block;
  background:#0057d9;
  color:white;
  padding:2px 9px;
  border-radius:5px;
  font-weight:700;
  margin-top:3px;
}

.review-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:8px;
}

.review-item{
  background:#f1f5f9;
  border:1px solid #dbe2ea;
  padding:8px 10px;
  border-radius:8px;
  font-size:13px;
}

.stars{
  color:#f59e0b;
  font-weight:800;
}

.comment{
  margin-top:12px;
  line-height:1.7;
}

.empty{
  color:#64748b;
  background:#f8fafc;
  padding:14px;
  border-radius:10px;
}

@media(max-width:800px){
  .course-body{
    grid-template-columns:1fr;
  }

  .review-card{
    grid-template-columns:1fr;
  }

  .review-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>楽単Search</h1>
  <p>先輩レビューから、自分に合う授業を探そう</p>
</header>

<div class="container">

<a class="back" href="index.html">← 検索画面に戻る</a>

<div class="result-title">
  <h2 id="resultCount">検索結果</h2>
</div>

<div id="resultList">読み込み中...</div>

</div>

<script>
let classes = [];
let reviews = [];

async function loadData(){
  try{
    const classResponse = await fetch("classes.json");
    classes = await classResponse.json();

    const reviewResponse = await fetch("reviews.json");
    reviews = await reviewResponse.json();

    searchClasses();
  }catch(error){
    document.getElementById("resultList").innerHTML =
      `<div class="card">データの読み込みに失敗しました。classes.json / reviews.json を確認してください。</div>`;
    console.error(error);
  }
}

function stars(n){
  n = Number(n || 0);
  return "★".repeat(n) + "☆".repeat(5-n);
}

function getEvaluation(c){
  return c.evaluation || {};
}

function getEvalValue(c,names){
  const ev = getEvaluation(c);
  for(const name of names){
    if(ev[name] !== undefined) return Number(ev[name]);
  }
  return 0;
}

function attendanceClass(value){
  if(value === "いける") return "attendance-ok";
  if(value === "厳しい") return "attendance-hard";
  if(value === "日による") return "attendance-depends";
  return "attendance-unknown";
}

function mostCommonAttendance(classReviews){
  if(classReviews.length === 0) return "不明";

  const count = {};
  classReviews.forEach(r=>{
    const key = r.attendance || "不明";
    count[key] = (count[key] || 0) + 1;
  });

  return Object.entries(count).sort((a,b)=>b[1]-a[1])[0][0];
}

function searchClasses(){
  const params = new URLSearchParams(location.search);

  const keyword = params.get("keyword") || "";
  const attendance = params.get("attendance") || "";

  const minTest = Number(params.get("minTest") || 0);
  const maxTest = Number(params.get("maxTest") || 100);
  const minReport = Number(params.get("minReport") || 0);
  const maxReport = Number(params.get("maxReport") || 100);

  const results = classes.filter(c=>{
    const classReviews = reviews.filter(r=>r.classId === c.id);

    const text = [
      c.name,
      c.teacher,
      c.description,
      ...(c.tags || [])
    ].join("");

    const testRate = getEvalValue(c,["試験","テスト"]);
    const reportRate = getEvalValue(c,["レポート"]);

    const attendanceOK =
      attendance === "" ||
      classReviews.some(r=>r.attendance === attendance);

    return (
      testRate >= minTest &&
      testRate <= maxTest &&
      reportRate >= minReport &&
      reportRate <= maxReport &&
      attendanceOK &&
      (keyword === "" || text.includes(keyword))
    );
  });

  displayResults(results);
}

function displayResults(results){
  const list = document.getElementById("resultList");
  const count = document.getElementById("resultCount");

  count.textContent = `検索結果：${results.length}件`;
  list.innerHTML = "";

  if(results.length === 0){
    list.innerHTML =
      `<div class="card">条件に合う授業が見つかりませんでした。</div>`;
    return;
  }

  results.forEach(c=>{
    const classReviews = reviews.filter(r=>r.classId === c.id);
    const ev = getEvaluation(c);
    const attendance = mostCommonAttendance(classReviews);

    const evaluationHtml = Object.entries(ev).map(([name,value])=>`
      <div class="eval-row">
        <div>${name}</div>
        <div class="bar-bg">
          <div class="bar" style="width:${value}%"></div>
        </div>
        <div>${value}%</div>
      </div>
    `).join("");

    const reviewHtml = classReviews.map(r=>`
      <div class="review-card">
        <div>
          <div class="avatar"></div>
          <div class="year">
            学籍番号上二桁<br>
            <span>${r.studentYear || "24"}</span>
          </div>
        </div>

        <div>
          <div>
            <strong>ピ逃げ可否：</strong>
            <span class="attendance-badge ${attendanceClass(r.attendance)}">
              ${r.attendance || "不明"}
            </span>
          </div>

          <div class="review-grid">
            <div class="review-item">テスト難易度：<span class="stars">${stars(r.testDifficulty)}</span></div>
            <div class="review-item">レポート難易度：<span class="stars">${stars(r.reportDifficulty)}</span></div>
            <div class="review-item">レポート量：<span class="stars">${stars(r.reportAmount)}</span></div>
            <div class="review-item">課題難易度：<span class="stars">${stars(r.assignmentDifficulty)}</span></div>
            <div class="review-item">課題量：<span class="stars">${stars(r.assignmentAmount)}</span></div>
          </div>

          <div class="comment">
            <strong>先輩レビュー：</strong><br>
            ${r.comment || ""}
          </div>
        </div>
      </div>
    `).join("");

    list.innerHTML += `
      <section class="card">
        <h2 class="course-title">${c.name}</h2>
        <p class="teacher"><strong>先生：</strong>${c.teacher}</p>

        <div class="tags">
          ${(c.tags || []).map(t=>`<span class="tag">${t}</span>`).join("")}
        </div>

        <div class="course-body">
          <div>
            <h3>評価方法の割合</h3>
            ${evaluationHtml}
          </div>

          <div>
            <h3>ピ逃げのしやすさ</h3>
            <div class="attendance-box">
              <span class="attendance-badge ${attendanceClass(attendance)}">
                ${attendance}
              </span>
            </div>
          </div>
        </div>

        <div class="review-head">
          <h3>先輩レビュー</h3>
          <span>レビュー数：${classReviews.length}件</span>
        </div>

        ${reviewHtml || `<div class="empty">まだレビューがありません。</div>`}
      </section>
    `;
  });
}

loadData();
</script>

</body>
</html>
